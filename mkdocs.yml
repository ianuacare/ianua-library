site_name: Ianuacare Library
site_description: Documentation for the Ianuacare Python library.
site_author: Ianua

# Source repository (Material theme: repo link, "edit this page")
repo_url: https://github.com/ianuacare/ianua-library
repo_name: ianuacare/ianua-library
edit_uri: edit/main/docs/

docs_dir: docs
strict: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Application integration flow: application-integration-flow.md
  - Audio transcription and diarization: audio-diarization.md
  - Architecture: architecture.md
  - API reference: api-reference.md
  - Preconfigurations: preconfigurations.md
  - Extending: extending.md
  - Documentation workflow: documentation-workflow.md
  - Agent rules (Cursor / Claude): agent-rules-commands-skills.md
